name = "princess-polka-dottie"
main = "src/index.ts"
compatibility_date = "2025-01-01"

[observability]
enabled = true

# Durable Objects — the two overwatchers
[durable_objects]
bindings = [
  { name = "PATTERN_SENSOR", class_name = "PatternSensor" },
  { name = "CONTEXT_MAPPER", class_name = "ContextMapper" },
]

# Migrations for Durable Object storage
[[migrations]]
tag = "v1"
new_sqlite_classes = ["PatternSensor", "ContextMapper"]

# KV namespace for shared pattern history
# To enable: create the namespace, then uncomment + paste the id.
#   wrangler kv namespace create PATTERN_HISTORY
# [[kv_namespaces]]
# binding = "PATTERN_HISTORY"
# id = "TODO_CREATE_NAMESPACE"

[vars]
ENVIRONMENT = "production"
